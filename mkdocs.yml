site_name: LLM + Control Tutorial
site_description: An applied tutorial on LLMs, API usage, and agentic workflows, with a control-systems angle.
site_author: Junhao Hou
site_url: https://markjh2001.github.io/LLM-Control-Tutorial/

repo_url: https://github.com/MarkJH2001/LLM-Control-Tutorial
repo_name: MarkJH2001/LLM-Control-Tutorial
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/satellite-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

extra:
  generator: false

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Setup: getting-started/setup.md
      - API Keys: getting-started/api-keys.md
  - LLM Basics:
      - llm-basics/index.md
      - What is an LLM: llm-basics/what-is-an-llm.md
      - Tokens: llm-basics/tokens.md
      - Sampling: llm-basics/sampling.md
      - Context Window: llm-basics/context-window.md
  - Calling the API:
      - api/index.md
      - Get an API Key:
          - api/get-a-key/index.md
          - OpenAI: api/get-a-key/openai.md
          - DeepSeek: api/get-a-key/deepseek.md
          - Qwen: api/get-a-key/qwen.md
          - SJTU: api/get-a-key/sjtu.md
      - First Call: api/first-call.md
      - Unified Client: api/unified-client.md
      - Streaming: api/streaming.md
      - Tool Use: api/tool-use.md
  - Agentic Workflows:
      - agents/index.md
      - Loops: agents/loops.md
      - Memory: agents/memory.md
      - Multi-agent: agents/multi-agent.md
  - LLM + Control:
      - control/index.md
      - Laplace Transforms (HW 2 & 3): control/laplace.md
      - Control Plots: control/plots.md
      - PID Tuning: control/pid.md
      - Real-World Applications: control/applications.md
