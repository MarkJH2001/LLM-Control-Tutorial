site_name: LLM + Control Tutorial
site_description: An applied tutorial on LLMs, API usage, and agentic workflows, with a control-systems angle.
site_author: Junhao Hou
site_url: https://markjh2001.github.io/LLM-Control-Tutorial/

repo_url: https://github.com/MarkJH2001/LLM-Control-Tutorial
repo_name: MarkJH2001/LLM-Control-Tutorial
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/satellite-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 开始入门
            Setup: 环境配置
            API Keys: API 密钥
            LLM Basics: LLM 基础
            What is an LLM: 什么是 LLM
            Tokens: 词元
            Sampling: 采样
            Context Window: 上下文窗口
            Calling the API: 调用 API
            Get an API Key: 申请 API 密钥
            OpenAI: OpenAI
            DeepSeek: DeepSeek
            Qwen: Qwen
            First Call: 首次调用
            Unified Client: 统一客户端
            Streaming: 流式输出
            Tool Use: 工具调用
            Agentic Workflows: 智能体工作流
            Loops: 循环
            Memory: 记忆
            Multi-agent: 多智能体
            LLM + Control: LLM + 控制
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Setup: getting-started/setup.md
      - API Keys: getting-started/api-keys.md
  - LLM Basics:
      - llm-basics/index.md
      - What is an LLM: llm-basics/what-is-an-llm.md
      - Tokens: llm-basics/tokens.md
      - Sampling: llm-basics/sampling.md
      - Context Window: llm-basics/context-window.md
  - Calling the API:
      - api/index.md
      - Get an API Key:
          - api/get-a-key/index.md
          - OpenAI: api/get-a-key/openai.md
          - DeepSeek: api/get-a-key/deepseek.md
          - Qwen: api/get-a-key/qwen.md
      - First Call: api/first-call.md
      - Unified Client: api/unified-client.md
      - Streaming: api/streaming.md
      - Tool Use: api/tool-use.md
  - Agentic Workflows:
      - agents/index.md
      - Loops: agents/loops.md
      - Memory: agents/memory.md
      - Multi-agent: agents/multi-agent.md
  - LLM + Control:
      - control/index.md
