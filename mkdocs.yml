site_name: LLM + Control Tutorial
site_description: An applied tutorial on LLMs, API usage, and agentic workflows, with a control-systems angle.
site_author: Junhao Hou
site_url: https://markjh2001.github.io/LLM-Control-Tutorial/

repo_url: https://github.com/MarkJH2001/LLM-Control-Tutorial
repo_name: MarkJH2001/LLM-Control-Tutorial
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - marimo
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Setup: getting-started/setup.md
      - API Keys: getting-started/api-keys.md
  - LLM Basics:
      - llm-basics/index.md
      - What is an LLM: llm-basics/what-is-an-llm.md
      - Tokens: llm-basics/tokens.md
      - Sampling: llm-basics/sampling.md
  - Calling the API:
      - api/index.md
      - First Call: api/first-call.md
      - Streaming: api/streaming.md
      - Tool Use: api/tool-use.md
  - Agentic Workflows:
      - agents/index.md
      - Loops: agents/loops.md
      - Memory: agents/memory.md
      - Multi-agent: agents/multi-agent.md
  - LLM + Control:
      - control/index.md
